<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown 代码块格式转换</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5d6673;
      --line: #d8dde5;
      --accent: #1b6f5c;
      --accent-strong: #155848;
      --code: #10151c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      padding: 0 14px;
      font: inherit;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    button:hover {
      border-color: var(--accent-strong);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      min-height: calc(100vh - 250px);
    }

    section {
      display: flex;
      min-width: 0;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 46px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 420px;
      resize: vertical;
      border: 0;
      padding: 14px;
      outline: none;
      color: var(--code);
      font: 14px/1.55 Consolas, "Cascadia Mono", "SFMono-Regular", monospace;
    }

    .files-panel {
      margin-top: 16px;
      min-height: 92px;
    }

    .file-list {
      display: grid;
    }

    .file-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      min-height: 48px;
      padding: 8px 14px;
      border-top: 1px solid var(--line);
    }

    .file-row:first-child {
      border-top: 0;
    }

    .file-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
    }

    .file-state {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    @media (max-width: 820px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .file-row {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .file-name {
        overflow-wrap: anywhere;
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Markdown 代码块格式转换</h1>
        <p>把单独一行的语言名移动到后面的空代码围栏上。</p>
      </div>
      <div class="actions">
        <button id="fileBtn" type="button">选择文件</button>
        <button id="folderBtn" type="button">选择文件夹</button>
        <button id="clearBtn" type="button">清空</button>
        <button id="copyBtn" type="button" class="primary">复制结果</button>
      </div>
    </header>

    <input id="fileInput" type="file" accept=".md,text/markdown,text/plain" multiple hidden>
    <input id="folderInput" type="file" accept=".md,text/markdown,text/plain" webkitdirectory multiple hidden>

    <div class="grid">
      <section>
        <div class="section-head">
          <h2>原始 Markdown</h2>
          <span id="inputCount" class="count">0 字</span>
        </div>
        <textarea id="input" spellcheck="false" placeholder="例如：
Bash

```
curl -O https://example.com/dataset.zip
```"></textarea>
      </section>

      <section>
        <div class="section-head">
          <h2>转换结果</h2>
          <span id="outputCount" class="count">0 字</span>
        </div>
        <textarea id="output" spellcheck="false" readonly></textarea>
      </section>
    </div>

    <section class="files-panel" aria-live="polite">
      <div class="section-head">
        <h2>文件转换</h2>
        <span id="fileSummary" class="count">未选择文件</span>
      </div>
      <div id="fileList" class="file-list"></div>
    </section>
  </main>

  <script>
    const input = document.querySelector("#input");
    const output = document.querySelector("#output");
    const inputCount = document.querySelector("#inputCount");
    const outputCount = document.querySelector("#outputCount");
    const copyBtn = document.querySelector("#copyBtn");
    const clearBtn = document.querySelector("#clearBtn");
    const fileBtn = document.querySelector("#fileBtn");
    const folderBtn = document.querySelector("#folderBtn");
    const fileInput = document.querySelector("#fileInput");
    const folderInput = document.querySelector("#folderInput");
    const fileSummary = document.querySelector("#fileSummary");
    const fileList = document.querySelector("#fileList");

    function lineEnding(line) {
      if (line.endsWith("\r\n")) return "\r\n";
      if (line.endsWith("\n")) return "\n";
      return "";
    }

    function lineBody(line) {
      return line.replace(/\r?\n$/, "");
    }

    function emptyBacktickFence(line) {
      const body = lineBody(line);
      const stripped = body.trim();
      if (/^`{3,}$/.test(stripped)) {
        const indent = body.slice(0, body.length - body.trimStart().length);
        return { indent, fence: "`".repeat(stripped.length) };
      }
      return null;
    }

    function languageCandidate(line) {
      const token = lineBody(line).trim();
      if (!token || token.length > 40) return null;
      if (/^[#\-*+>`]/.test(token)) return null;
      if (/\s/.test(token)) return null;
      return token;
    }

    function convertMarkdown(text) {
      const lines = text.match(/[^\r\n]*(?:\r\n|\n|$)/g) || [];
      if (lines.length && lines[lines.length - 1] === "") lines.pop();
      const result = [];
      let inFence = false;
      let fenceMarker = "";

      for (const line of lines) {
        const body = lineBody(line);
        const stripped = body.trim();

        if (inFence) {
          result.push(line);
          if (stripped.startsWith(fenceMarker) && /^`+$/.test(stripped)) {
            inFence = false;
            fenceMarker = "";
          }
          continue;
        }

        if (stripped.startsWith("```")) {
          const emptyFence = emptyBacktickFence(line);
          if (emptyFence) {
            let previousIndex = result.length - 1;
            while (previousIndex >= 0 && lineBody(result[previousIndex]).trim() === "") {
              previousIndex -= 1;
            }

            const language = previousIndex >= 0 ? languageCandidate(result[previousIndex]) : null;
            if (language) {
              result.splice(previousIndex);
              result.push(`${emptyFence.indent}${emptyFence.fence}${language}${lineEnding(line)}`);
              inFence = true;
              fenceMarker = emptyFence.fence;
              continue;
            }

            result.push(line);
            inFence = true;
            fenceMarker = emptyFence.fence;
            continue;
          }

          result.push(line);
          fenceMarker = (body.match(/^\s*(`{3,})/) || [null, "```"])[1];
          inFence = true;
          continue;
        }

        result.push(line);
      }

      return result.join("");
    }

    function refresh() {
      output.value = convertMarkdown(input.value);
      inputCount.textContent = `${input.value.length} 字`;
      outputCount.textContent = `${output.value.length} 字`;
    }

    function downloadText(filename, text) {
      const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function readFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file, "utf-8");
      });
    }

    function fileLabel(file) {
      return file.webkitRelativePath || file.name;
    }

    function downloadName(file) {
      return fileLabel(file).replace(/[\\/]+/g, "__");
    }

    async function processFiles(fileSource) {
      const markdownFiles = Array.from(fileSource || []).filter((file) => {
        return file.name.toLowerCase().endsWith(".md");
      });

      fileList.replaceChildren();
      fileSummary.textContent = markdownFiles.length
        ? `读取 ${markdownFiles.length} 个 Markdown 文件`
        : "没有选择 Markdown 文件";

      for (const file of markdownFiles) {
        const row = document.createElement("div");
        row.className = "file-row";

        const name = document.createElement("div");
        name.className = "file-name";
        name.textContent = fileLabel(file);

        const state = document.createElement("div");
        state.className = "file-state";
        state.textContent = "读取中";

        const downloadBtn = document.createElement("button");
        downloadBtn.type = "button";
        downloadBtn.textContent = "下载";
        downloadBtn.disabled = true;

        row.append(name, state, downloadBtn);
        fileList.append(row);

        try {
          const original = await readFile(file);
          const converted = convertMarkdown(original);
          const changed = converted !== original;
          state.textContent = changed ? "已转换" : "无需修改";
          downloadBtn.disabled = false;
          downloadBtn.addEventListener("click", () => {
            downloadText(downloadName(file), converted);
          });
        } catch (error) {
          state.textContent = "读取失败";
        }
      }
    }

    input.addEventListener("input", refresh);
    fileBtn.addEventListener("click", () => fileInput.click());
    folderBtn.addEventListener("click", () => folderInput.click());
    fileInput.addEventListener("change", () => processFiles(fileInput.files));
    folderInput.addEventListener("change", () => processFiles(folderInput.files));
    clearBtn.addEventListener("click", () => {
      input.value = "";
      fileInput.value = "";
      folderInput.value = "";
      fileList.replaceChildren();
      fileSummary.textContent = "未选择文件";
      refresh();
      input.focus();
    });
    copyBtn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(output.value);
      copyBtn.textContent = "已复制";
      setTimeout(() => {
        copyBtn.textContent = "复制结果";
      }, 1200);
    });

    refresh();
  </script>
</body>
</html>
