<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="修复从 Gemini 复制出来的 Markdown 代码块语言名错位问题。">
  <title>Gemini 复制文本 Markdown 转换器</title>
  <link rel="stylesheet" href="styles.css">
  <script src="converter.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main>
    <header class="page-head">
      <div>
        <h1>Gemini 复制文本 Markdown 转换器</h1>
        <p>修复从 Gemini 复制出来的代码块语言名错位问题，转换过程全部在浏览器本地完成。</p>
      </div>
      <div class="actions">
        <button id="fileBtn" type="button">选择文件</button>
        <button id="folderBtn" type="button">选择文件夹</button>
        <button id="clearBtn" type="button">清空</button>
        <button id="copyBtn" type="button" class="primary">复制结果</button>
      </div>
    </header>

    <input id="fileInput" type="file" accept=".md,text/markdown,text/plain" multiple hidden>
    <input id="folderInput" type="file" accept=".md,text/markdown,text/plain" webkitdirectory multiple hidden>

    <div class="workspace">
      <section class="editor-panel">
        <div class="section-head">
          <h2>Gemini 原始 Markdown</h2>
          <span id="inputCount" class="count">0 字</span>
        </div>
        <textarea id="input" spellcheck="false" placeholder="例如：
Bash

```
curl -O https://example.com/dataset.zip
```"></textarea>
      </section>

      <section class="editor-panel">
        <div class="section-head">
          <h2>转换结果</h2>
          <span id="outputCount" class="count">0 字</span>
        </div>
        <textarea id="output" spellcheck="false" readonly></textarea>
      </section>
    </div>

    <section class="files-panel" aria-live="polite">
      <div class="section-head">
        <h2>文件转换</h2>
        <span id="fileSummary" class="count">未选择文件</span>
      </div>
      <div id="fileList" class="file-list"></div>
    </section>

    <p id="statusText" class="status" role="status">等待输入</p>
    <div id="toast" class="toast" role="alert" aria-live="assertive"></div>
  </main>
</body>
</html>
